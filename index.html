<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Notes App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 70%;
            padding: 8px;
            margin-right: 5px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li {
            background: #eef;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Quick Notes</h1>

    <input id="noteInput" placeholder="Enter note">
    <button onclick="saveNote()">Save</button>

    <ul id="notesList"></ul>
</div>

<script>

function saveNote() {
    let input = document.getElementById("noteInput");
    let note = input.value.trim();

    // Validation
    if (note === "") {
        alert("Please enter a note!");
        return;
    }

    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    notes.push(note);

    localStorage.setItem("notes", JSON.stringify(notes));

    // ✅ Clear input after saving
    input.value = "";

    showNotes();
}

function showNotes() {
    let notes = JSON.parse(localStorage.getItem("notes")) || [];

    let list = document.getElementById("notesList");
    list.innerHTML = "";

    notes.forEach(note => {
        let li = document.createElement("li");
        li.textContent = note;
        list.appendChild(li);
    });
}

// Load notes on page load
showNotes();

</script>

</body>
</html>
