<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Notes</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px;
        }

        li {
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Quick Notes</h2>

    <!-- Auto clear on click -->
    <input id="noteInput" placeholder="Enter note" onfocus="this.value=''">
    <button onclick="saveNote()">Save</button>

    <ul id="notesList"></ul>
</div>

<script>
function saveNote() {
    let input = document.getElementById("noteInput");
    let note = input.value.trim();

    if (note === "") return;

    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    notes.push(note);

    localStorage.setItem("notes", JSON.stringify(notes));

    // Clear after save
    input.value = "";

    showNotes();
}

function showNotes() {
    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    let list = document.getElementById("notesList");

    list.innerHTML = "";

    notes.forEach(note => {
        let li = document.createElement("li");
        li.textContent = note;
        list.appendChild(li);
    });
}

showNotes();
</script>

</body>
</html>
