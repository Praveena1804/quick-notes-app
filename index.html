<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Notes</title>

    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            padding: 20px;
            background: #f4f6f8;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Quick Notes</h2>

    <!-- Clear only when user starts typing -->
    <input id="noteInput" placeholder="Enter note" oninput="clearOnce()">
    <button onclick="saveNote()">Save</button>

    <ul id="notesList"></ul>
</div>

<script>
let cleared = false;

function clearOnce() {
    let input = document.getElementById("noteInput");

    if (!cleared) {
        input.value = "";
        cleared = true;
    }
}

function saveNote() {
    let input = document.getElementById("noteInput");
    let note = input.value.trim();

    if (note === "") return;

    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    notes.push(note);

    localStorage.setItem("notes", JSON.stringify(notes));

    input.value = "";
    cleared = false; // reset for next input

    showNotes();
}

function showNotes() {
    let notes = JSON.parse(localStorage.getItem("notes")) || [];
    let list = document.getElementById("notesList");

    list.innerHTML = "";

    notes.forEach(note => {
        let li = document.createElement("li");
        li.textContent = note;
        list.appendChild(li);
    });
}

showNotes();
</script>

</body>
</html>
